<!DOCTYPE html>
<html>
<head>
    <title>My Web Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #45b7d1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #ff6b6b;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 1.2rem;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #4ecdc4;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background: #45b7d1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Web Page</h1>
        <p>Welcome to my colorful website!</p>
        <button onclick="alert('Hello from My Web Page!')">
            Click Me
        </button>
    </div>
</body>
</html>
