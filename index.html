<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Layout</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .card {
            background: white;
            width: 250px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #2c3e50;
        }

        .card p {
            color: #666;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>My Card Layout</h1>

    <div class="card-container">

        <div class="card">
            <h2>Card One</h2>
            <p>This is the first card with some sample content.</p>
        </div>

        <div class="card">
            <h2>Card Two</h2>
            <p>This is the second card. Cards are useful for displaying information neatly.</p>
        </div>

        <div class="card">
            <h2>Card Three</h2>
            <p>This is the third card with a simple hover effect and shadow.</p>
        </div>

    </div>

</body>
</html>
